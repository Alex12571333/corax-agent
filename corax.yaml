agent:
  name: corax
  profile: default
  mode: local
  first_run: true

runtime:
  autostart: false
  log_level: INFO
  workspace_path: ./workspace
  data_path: ./data
  logs_path: ./logs

planner:
  active: stub
  providers:
    stub:
      enabled: true
      type: planner
      description: "Local stub planner for scaffold testing"

memory:
  active: none
  providers:
    none:
      enabled: true
      type: memory
      description: "No persistent memory yet"

connectors:
  active:
    - terminal
  providers:
    terminal:
      enabled: true
      type: connector
      description: "Terminal connector placeholder"

capabilities:
  enabled:
    - echo
    - filesystem
    - editor
    - shell
    - llm.local
    - telegram.connector
  available:
    echo:
      enabled: true
      type: tool
      description: "Built-in echo capability"
    filesystem:
      enabled: true
      type: tool
      description: "Workspace-confined filesystem capability"
      path: ../corax-filesystem-capability
    editor:
      enabled: true
      type: tool
      description: "Workspace-confined text editor capability"
      path: ../corax-editor-capability
    shell:
      enabled: true
      type: tool
      description: "Guarded local shell command capability"
      path: ../corax-shell-capability
    llm.local:
      enabled: true
      type: connector
      description: "Local Spark LLM connector (text + optional image/video)"
      path: ../corax-llm-local-connector
    telegram.connector:
      enabled: true
      type: connector
      description: "Telegram chat connector (streaming, commands, HTML formatting)"
      path: ../corax-telegram-connector

security:
  mode: normal
  core_readonly: true
  allow_shell: false
  allow_file_write: false
  blocked_paths:
    - ../corax-core
    - ../corax-sdk
    - ~/.ssh
    - .env

limits:
  max_parallel_tasks: 4
  max_plan_tasks: 30
  max_tasks_per_correlation: 50
  task_timeout_seconds: 60
  max_payload_mb: 20

ui:
  theme: terminal
  mascot: corax
  show_banner: true

llm:
  # Local Spark LLM connector setup. Exported to CORAX_LLM_* at runtime start.
  # Edit here or via the runtime menu (option "L"). Text input is always on;
  # toggle image/video for multimodal input. Spark vLLM server on the GB10.
  base_url: http://192.168.0.10:8000/v1
  model: google/gemma-4-12B-it
  enable_image: false
  enable_video: false

telegram:
  # Telegram connector setup. Exported to CORAX_TELEGRAM_* at runtime start.
  # Edit here or via the runtime menu (option "T"). The bot token is read from
  # the CORAX_TELEGRAM_BOT_TOKEN environment variable and is NOT stored here.
  # allowed_chats is a comma-separated allow-list (empty = any chat).
  base_url: https://api.telegram.org
  allowed_chats: ""
